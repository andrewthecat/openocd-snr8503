# Snaner SNR8503x / SNR8503M, Cortex-M0 over SWD

transport select swd

if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME snr8503x
}

if { [info exists WORKAREASIZE] } {
	set _WORKAREASIZE $WORKAREASIZE
} else {
	set _WORKAREASIZE 0x400
}

if { [info exists FLASHSIZE] } {
	set _FLASHSIZE $FLASHSIZE
} else {
	set _FLASHSIZE 0x8000
}

if { [info exists CPUTAPID] } {
	set _CPUTAPID $CPUTAPID
} else {
	set _CPUTAPID 0x0bb11477
}

swd newdap $_CHIPNAME cpu -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -dap $_CHIPNAME.dap

$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size $_WORKAREASIZE

proc snr8503x_disable_iwdg {} {
	# Vendor SDK: IWDG_DISABLE() => IWDG->CFG = 0x3C00
	mww 0x40010C04 0x00003C00
}

$_TARGETNAME configure -event examine-end {
	snr8503x_disable_iwdg
}

$_TARGETNAME configure -event reset-end {
	snr8503x_disable_iwdg
}

adapter speed 500

if {![using_hla]} {
	cortex_m reset_config sysresetreq
}

set _FLASHNAME $_CHIPNAME.flash
flash bank $_FLASHNAME snr8503x 0x00000000 $_FLASHSIZE 0 0 $_TARGETNAME
